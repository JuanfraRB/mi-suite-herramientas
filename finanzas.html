<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Finanzas Personales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Control de Finanzas Avanzado</h2>
        <div class="backup-btns">
            <button class="btn-sub" onclick="exportJSON()">💾 Exportar Copia (JSON)</button>
            <button class="btn-sub" onclick="document.getElementById('importFile').click()">📂 Importar Copia</button>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(event)">
        </div>
    </div>

    <div class="balance-cards">
        <div class="card-stat">
            <h3>Balance Neto</h3>
            <p id="total-balance">0.00 €</p>
        </div>
        <div class="card-stat">
            <h3>Ingresos Totales</h3>
            <p id="total-income">0.00 €</p>
        </div>
        <div class="card-stat">
            <h3>Gastos Totales</h3>
            <p id="total-expense">0.00 €</p>
        </div>
    </div>

    <div class="main-grid">
        <div class="block-white">
            <h3 style="margin-top:0;">Nuevo Movimiento</h3>
            <div class="form-group">
                <label>Concepto:</label>
                <input type="text" id="description" placeholder="Ej: Compra Mercadona, Nómina...">
            </div>
            <div class="form-group">
                <label>Importe (€):</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Tipo:</label>
                <select id="type" onchange="updateCategories()">
                    <option value="gasto">Gasto</option>
                    <option value="ingreso">Ingreso</option>
                </select>
            </div>
            <div class="form-group">
                <label>Categoría:</label>
                <select id="category"></select>
            </div>
            <button class="btn-add" onclick="addTransaction()">Registrar Transacción</button>
        </div>

        <div class="block-white">
            <h3 style="margin-top:0;">Distribución de Gastos</h3>
            <div class="chart-container">
                <canvas id="financeChart"></canvas>
            </div>
        </div>
    </div>

    <div class="block-white history-block">
        <h3 style="margin-top:0;">Historial de Transacciones</h3>
        <table>
            <thead>
                <tr>
                    <th>Concepto</th>
                    <th>Categoría</th>
                    <th>Importe</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Categorías predefinidas según el tipo
    const categoriesMap = {
        gasto: ["Comida", "Vivienda/Alquiler", "Ocio/Restaurantes", "Transporte/Gasolina", "Facturas/Luz/Agua", "Otros Gastos"],
        ingreso: ["Nómina/Sueldo", "Inversiones", "Ventas", "Otros Ingresos"]
    };

    let transactions = [];
    let financeChart = null; // Instancia global del gráfico

    window.onload = function() {
        loadData();
        updateCategories();
        renderUI();
    };

    function updateCategories() {
        const type = document.getElementById('type').value;
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = '';
        categoriesMap[type].forEach(cat => {
            catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
    }

    function addTransaction() {
        const descHtml = document.getElementById('description');
        const amountHtml = document.getElementById('amount');
        const type = document.getElementById('type').value;
        const category = document.getElementById('category').value;

        const description = descHtml.value.trim();
        const amount = parseFloat(amountHtml.value);

        if (!description || isNaN(amount) || amount <= 0) {
            alert("Por favor, introduce un concepto válido y un importe mayor que cero.");
            return;
        }

        const transaction = {
            id: 'trans_' + Date.now(),
            description: description,
            amount: amount,
            type: type,
            category: category
        };

        transactions.push(transaction);
        descHtml.value = '';
        amountHtml.value = '';

        saveData();
        renderUI();
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        saveData();
        renderUI();
    }

    function renderUI() {
        let incomeTotal = 0;
        let expenseTotal = 0;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        // Objeto para acumular gastos por categoría para el gráfico
        const expenseDataMap = {};
        categoriesMap.gasto.forEach(cat => expenseDataMap[cat] = 0);

        // Procesar array de transacciones
        transactions.forEach(t => {
            if (t.type === 'ingreso') {
                incomeTotal += t.amount;
            } else {
                expenseTotal += t.amount;
                if (expenseDataMap[t.category] !== undefined) {
                    expenseDataMap[t.category] += t.amount;
                }
            }

            // Añadir fila a la tabla (orden inverso para ver lo último primero)
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.description}</td>
                <td><small style="background:#e5e7eb; padding:3px 6px; border-radius:4px;">${t.category}</small></td>
                <td class="${t.type === 'ingreso' ? 'type-inc' : 'type-exp'}">
                    ${t.type === 'ingreso' ? '+' : '-'}${t.amount.toFixed(2)} €
                </td>
                <td><button class="btn-del" onclick="deleteTransaction('${t.id}')">✕</button></td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
        });

        // Actualizar tarjetas numéricas
        const balance = incomeTotal - expenseTotal;
        document.getElementById('total-balance').innerText = `${balance.toFixed(2)} €`;
        document.getElementById('total-income').innerText = `${incomeTotal.toFixed(2)} €`;
        document.getElementById('total-expense').innerText = `${expenseTotal.toFixed(2)} €`;

        // Renderizar o actualizar el Gráfico Chart.js
        renderChart(Object.keys(expenseDataMap), Object.values(expenseDataMap));
    }

    function renderChart(labels, dataValues) {
        const ctx = document.getElementById('financeChart').getContext('2d');
        
        // Comprobar si ya hay gastos registrados para que el gráfico no sea estéril
        const hasExpenses = dataValues.some(v => v > 0);

        if (financeChart) {
            financeChart.destroy(); // Destruimos el gráfico anterior para evitar duplicados en memoria
        }

        financeChart = new Chart(ctx, {
            type: 'doughnut', // Tipo de gráfico: Rosco/Tarta
            data: {
                labels: hasExpenses ? labels : ["Sin gastos registrados"],
                datasets: [{
                    data: hasExpenses ? dataValues : [1],
                    backgroundColor: hasExpenses ? ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0', '#a29bfe'] : ['#e5e7eb'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } }
            }
        });
    }

    // --- COPIAS DE SEGURIDAD AVANZADAS (JSON) ---
    function exportJSON() {
        if(transactions.length === 0) return alert("No hay datos para exportar.");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `respaldo_finanzas_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    transactions = importedData;
                    saveData();
                    renderUI();
                    alert("¡Copia de seguridad restaurada con éxito!");
                } else {
                    alert("El archivo no tiene un formato de datos de finanzas válido.");
                }
            } catch (err) {
                alert("Error al leer el archivo JSON.");
            }
        };
        reader.readAsText(file);
    }

    function saveData() { localStorage.setItem('local_finance_data', JSON.stringify(transactions)); }
    function loadData() {
        const stored = localStorage.getItem('local_finance_data');
        if (stored) transactions = JSON.parse(stored);
    }
</script>

</body>
</html>
