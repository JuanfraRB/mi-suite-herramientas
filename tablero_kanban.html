<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Kanban de Tareas</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

<div class="container" style="margin-top: 20px;">
    <div class="header-actions">
        <input type="text" id="taskInput" placeholder="Escribe una nueva nota o tarea pendiente..." onkeypress="handleKeyPress(event)">
        <button class="btn-add" onclick="createNewTask()">Añadir Tarea</button>
    </div>

    <div class="board">
        <div class="column col-todo">
            <h3>Por Hacer <span id="count-todo">(0)</span></h3>
            <div class="card-list" id="todo" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></div>
        </div>

        <div class="column col-progress">
            <h3>En Proceso <span id="count-progress">(0)</span></h3>
            <div class="card-list" id="progress" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></div>
        </div>

        <div class="column col-done">
            <h3>Hecho <span id="count-done">(0)</span></h3>
            <div class="card-list" id="done" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></div>
        </div>
    </div>
</div>

<script>
    let tasks = [];
    window.onload = function() { loadTasks(); renderBoard(); };
    function createNewTask() {
        const input = document.getElementById('taskInput'); const text = input.value.trim(); if (!text) return;
        tasks.push({ id: 'task_' + Date.now(), text: text, column: 'todo' });
        input.value = ''; saveTasks(); renderBoard();
    }
    function handleKeyPress(event) { if (event.key === 'Enter') createNewTask(); }
    function renderBoard() {
        const cols = { todo: document.getElementById('todo'), progress: document.getElementById('progress'), done: document.getElementById('done') };
        Object.values(cols).forEach(c => c.innerHTML = '');
        let counts = { todo: 0, progress: 0, done: 0 };

        tasks.forEach(task => {
            counts[task.column]++;
            const card = document.createElement('div'); card.className = 'kanban-card'; card.id = task.id; card.draggable = true;
            card.setAttribute('ondragstart', 'drag(event)');
            card.innerHTML = `
                <div class="card-text">${task.text}</div>
                <button class="btn-delete" onclick="deleteTask('${task.id}')">×</button>
                <select class="mobile-move-select" onchange="moveTaskMobile('${task.id}', this.value)">
                    <option value="todo" ${task.column === 'todo' ? 'selected' : ''}>Mover a: Por Hacer</option>
                    <option value="progress" ${task.column === 'progress' ? 'selected' : ''}>Mover a: En Proceso</option>
                    <option value="done" ${task.column === 'done' ? 'selected' : ''}>Mover a: Hecho</option>
                </select>
            `;
            if (cols[task.column]) cols[task.column].appendChild(card);
        });
        document.getElementById('count-todo').innerText = `(${counts.todo})`;
        document.getElementById('count-progress').innerText = `(${counts.progress})`;
        document.getElementById('count-done').innerText = `(${counts.done})`;
    }
    function drag(e) { e.dataTransfer.setData("text/plain", e.target.id); }
    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function drop(e) {
        e.preventDefault(); const list = e.currentTarget; list.classList.remove('drag-over');
        const id = e.dataTransfer.getData("text/plain"); const task = tasks.find(t => t.id === id);
        if (task) { task.column = list.id; saveTasks(); renderBoard(); }
    }
    function moveTaskMobile(id, col) { const task = tasks.find(t => t.id === id); if(task){ task.column = col; saveTasks(); renderBoard(); } }
    function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); saveTasks(); renderBoard(); }
    function saveTasks() { localStorage.setItem('local_kanban_tasks', JSON.stringify(tasks)); }
    function loadTasks() { const stored = localStorage.getItem('local_kanban_tasks'); if (stored) tasks = JSON.parse(stored); }
</script>
</body>
</html>
